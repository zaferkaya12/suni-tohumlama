<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suni Tohumlama Stok Takip Sistemi</title>
    <style>
        /* Lisans Ekranı Tasarımı */
        #lisans-ekrani {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .lisans-kutusu {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .lisans-kutusu h2 {
            color: #0f172a;
            margin-bottom: 10px;
            font-size: 22px;
        }
        .lisans-kutusu p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .cihaz-kodu-alanı {
            background-color: #f1f5f9;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 16px;
            color: #334155;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px dashed #cbd5e1;
        }
        .lisans-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        .lisans-input:focus {
            border-color: #3b82f6;
            outline: none;
        }
        .lisans-buton {
            width: 100%;
            padding: 12px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .lisans-buton:hover {
            background-color: #1d4ed8;
        }
        #hata-mesaji {
            color: #dc2626;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
        /* Ana Program İlk Başta Gizli */
        #ana-program {
            display: none;
        }
    </style>
</head>
<body>

    <div id="lisans-ekrani">
        <div class="lisans-kutusu">
            <h2>Cihaz Yetkilendirme</h2>
            <p>Lütfen aşağıdaki cihaz kodunu yöneticinize bildirerek lisans anahtarınızı alınız.</p>
            
            <div class="cihaz-kodu-alanı" id="display-cihaz-kodu">Üretiliyor...</div>
            
            <input type="text" id="lisans-anahtari" class="lisans-input" placeholder="Lisans Anahtarını Girin">
            <button class="lisans-buton" onclick="lisansKontrol Et()">Uygulamayı Aktif Et</button>
            <div id="hata-mesaji">Hatalı veya geçersiz lisans anahtarı!</div>
        </div>
    </div>

    <div id="ana-program">
        <iframe src="about:blank" id="orijinal-icerik" style="position:fixed; top:0; left:0; width:100%; height:100%; border:none; z-index:9999;"></iframe>
    </div>

    <script>
        // 1. Cihaza özel benzersiz bir kod üretme fonksiyonu
        function cihazKoduUret() {
            let cihazId = localStorage.getItem('suni_tohumlama_cihaz_id');
            if (!cihazId) {
                // Rastgele 6 haneli bir bilgisayar numarası üretir
                cihazId = 'ST-' + Math.floor(100000 + Math.random() * 900000);
                localStorage.setItem('suni_tohumlama_cihaz_id', cihazId);
            }
            return cihazId;
        }

        // 2. Basit ve güvenli şifre doğrulama motoru (Algoritma)
        // Yöneticinin vereceği şifre: Cihaz Kodunun sayısal kısmının 2 katı + 2026 olacaktır.
        function dogruAnahtarHesapla(cihazId) {
            let sadeceSayilar = cihazId.replace(/[^0-9]/g, '');
            let formul = (parseInt(sadeceSayilar) * 2) + 2026; 
            return 'STK-' + formul;
        }

        // Sayfa açıldığında çalışacak ilk hazırlık
        const mevcutCihazKodu = cihazKoduUret();
        document.getElementById('display-cihaz-kodu').innerText = mevcutCihazKodu;

        // Daha önce doğru şifre girilmiş mi kontrolü
        if (localStorage.getItem('suni_tohumlama_aktif_mi') === 'evet') {
            uygulamayiAc();
        }

        // Butona basıldığında şifreyi kontrol eden fonksiyon
        function lisansKontrolEt() {
            const girilenSifre = document.getElementById('lisans-anahtari').value.trim();
            const beklenenSifre = dogruAnahtarHesapla(mevcutCihazKodu);

            if (girilenSifre === beklenenSifre) {
                localStorage.setItem('suni_tohumlama_aktif_mi', 'evet');
                uygulamayiAc();
            } else {
                const hataAlanlı = document.getElementById('hata-mesaji');
                hataAlanlı.style.display = 'block';
                setTimeout(() => { hataAlanlı.style.display = 'none'; }, 3000);
            }
        }

        // Şifre doğruysa kilit ekranını kaldıran fonksiyon
        function uygulamayiAc() {
            document.getElementById('lisans-ekrani').style.display = 'none';
            document.getElementById('ana-program').style.display = 'block';
            
            // Orijinal kodlarınızı korumak için buraya mevcut sayfanın kendi kodlarını basıyoruz
            document.getElementById('orijinal-icerik').srcdoc = `
                <div style="padding:20px; font-family:sans-serif;">
                    <h3>Suni Tohumlama Takip Sistemi Aktif</h3>
                    <p>Program başarıyla doğrulandı ve kullanıma hazır.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
