<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suni Tohumlama Stok Takip Sistemi</title>
    <style>
        /* KİLİT EKRANI TASARIMI */
        #lisans-ekrani {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1e293b; display: flex; justify-content: center;
            align-items: center; z-index: 9999999; font-family: sans-serif;
        }
        .lisans-kutusu {
            background-color: white; padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 90%; max-width: 400px; text-align: center;
        }
        .cihaz-kodu-alani {
            background-color: #f1f5f9; padding: 10px; border-radius: 6px;
            font-family: monospace; font-size: 18px; color: #334155;
            font-weight: bold; margin: 20px 0; border: 1px dashed #cbd5e1;
        }
        .lisans-input {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0;
            border-radius: 6px; font-size: 16px; margin-bottom: 20px; text-align: center; font-weight: bold;
        }
        .lisans-buton {
            width: 100%; padding: 12px; background-color: #2563eb; color: white;
            border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        #hata-mesaji { color: #dc2626; font-size: 14px; margin-top: 10px; display: none; }
        
        /* Ana program penceresi ilk başta gizli */
        #ana-program-penceresi {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: none; display: none; z-index: 8888888;
        }
    </style>
</head>
<body>

    <div id="lisans-ekrani">
        <div class="lisans-kutusu">
            <h2>Cihaz Yetkilendirme</h2>
            <p>Aşağıdaki kodu yöneticinize bildirerek lisans anahtarınızı alınız.</p>
            <div class="cihaz-kodu-alani" id="display-cihaz-kodu">ST-Yükleniyor</div>
            <input type="text" id="lisans-anahtari" class="lisans-input" placeholder="Lisans Anahtarını Girin">
            <button class="lisans-buton" id="onay-butonu">Uygulamayı Aktif Et</button>
            <div id="hata-mesaji">Hatalı veya geçersiz lisans anahtarı!</div>
        </div>
    </div>

    <iframe id="ana-program-penceresi" src="stok_takip.html"></iframe>

    <script>
        (function() {
            function cihazKoduUret() {
                let cihazId = localStorage.getItem('suni_tohumlama_cihaz_id');
                if (!cihazId) {
                    cihazId = 'ST-' + Math.floor(100000 + Math.random() * 900000);
                    localStorage.setItem('suni_tohumlama_cihaz_id', cihazId);
                }
                return cihazId;
            }

            function dogruAnahtarHesapla(cihazId) {
                let sadeceSayilar = cihazId.replace(/[^0-9]/g, '');
                let formul = (parseInt(sadeceSayilar) * 2) + 2026; 
                return 'STK-' + formul;
            }

            const mevcutCihazKodu = cihazKoduUret();
            document.getElementById('display-cihaz-kodu').innerText = mevcutCihazKodu;

            if (localStorage.getItem('suni_tohumlama_aktif_mi') === 'evet') {
                uygulamayiAc();
            }

            document.getElementById('onay-butonu').addEventListener('click', function() {
                const girilenSifre = document.getElementById('lisans-anahtari').value.trim();
                const beklenenSifre = dogruAnahtarHesapla(mevcutCihazKodu);

                if (girilenSifre === beklenenSifre) {
                    localStorage.setItem('suni_tohumlama_aktif_mi', 'evet');
                    uygulamayiAc();
                } else {
                    const hataAlani = document.getElementById('hata-mesaji');
                    hataAlani.style.display = 'block';
                    setTimeout(() => { hataAlani.style.display = 'none'; }, 3000);
                }
            });

            function uygulamayiAc() {
                document.getElementById('lisans-ekrani').style.display = 'none';
                document.getElementById('ana-program-penceresi').style.display = 'block';
            }
        })();
    </script>
</body>
</html>
